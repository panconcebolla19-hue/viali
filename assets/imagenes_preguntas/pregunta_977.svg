<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#EEEEEE"/>
  <!-- Agent body -->
  <!-- Legs -->
  <line x1="185" y1="285" x2="175" y2="360" stroke="#112299" stroke-width="18" stroke-linecap="round"/>
  <line x1="215" y1="285" x2="225" y2="360" stroke="#112299" stroke-width="18" stroke-linecap="round"/>
  <!-- Torso (high-vis jacket) -->
  <rect x="165" y="190" width="70" height="100" rx="10" fill="#112299"/>
  <!-- Hi-vis stripes -->
  <rect x="165" y="215" width="70" height="10" fill="#FFDD00" opacity="0.8"/>
  <rect x="165" y="250" width="70" height="10" fill="#FFDD00" opacity="0.8"/>
  <!-- Arms: RIGHT arm raised UP (stop signal) -->
  <line x1="165" y1="210" x2="110" y2="210" stroke="#112299" stroke-width="18" stroke-linecap="round"/>
  <line x1="235" y1="210" x2="235" y2="145" stroke="#112299" stroke-width="18" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="105" cy="210" r="12" fill="#F5C5A0"/>
  <!-- Right hand (raised) -->
  <circle cx="235" cy="138" r="12" fill="#F5C5A0"/>
  <!-- Head -->
  <circle cx="200" cy="155" r="35" fill="#F5C5A0"/>
  <!-- Police cap -->
  <ellipse cx="200" cy="125" rx="38" ry="12" fill="#112299"/>
  <rect x="162" y="118" width="76" height="14" rx="4" fill="#112299"/>
  <!-- Badge on cap -->
  <rect x="192" y="118" width="16" height="10" rx="2" fill="#FFDD00"/>
  <!-- Face -->
  <circle cx="190" cy="158" r="4" fill="#333"/>
  <circle cx="210" cy="158" r="4" fill="#333"/>
  <path d="M188,170 Q200,178 212,170" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- STOP sign in raised hand -->
  <rect x="220" y="90" width="40" height="42" rx="5" fill="#CC0000"/>
  <text x="240" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white">STOP</text>
  <!-- Cars stopped -->
  <rect x="30" y="195" width="50" height="30" rx="6" fill="#3399FF"/>
  <rect x="330" y="195" width="50" height="30" rx="6" fill="#FF6600"/>
  <!-- Red light indicators -->
  <circle cx="300" cy="210" r="8" fill="#FF3333"/>
  <circle cx="90" cy="210" r="8" fill="#FF3333"/>
  <!-- Caption -->
</svg>