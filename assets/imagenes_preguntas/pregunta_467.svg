<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#90C060"/>
  <!-- Dual carriageway: 2 lanes same direction -->
  <rect x="80" y="0" width="240" height="400" fill="#888888"/>
  <!-- Central reservation (mediana) -->
  <rect x="185" y="0" width="30" height="400" fill="#70A040"/>
  <!-- Lane markings left carriageway -->
  <line x1="115" y1="0" x2="115" y2="400" stroke="white" stroke-width="3" stroke-dasharray="20,14"/>
  <!-- Edge lines -->
  <line x1="80" y1="0" x2="80" y2="400" stroke="white" stroke-width="3"/>
  <line x1="185" y1="0" x2="185" y2="400" stroke="white" stroke-width="2"/>
  <line x1="215" y1="0" x2="215" y2="400" stroke="white" stroke-width="2"/>
  <line x1="320" y1="0" x2="320" y2="400" stroke="white" stroke-width="3"/>
  <!-- Right carriageway dashes -->
  <line x1="285" y1="0" x2="285" y2="400" stroke="white" stroke-width="3" stroke-dasharray="20,14"/>
  <!-- Our car in LEFT lane (wrong position) -->
  <rect x="88" y="220" width="36" height="60" rx="6" fill="#3399FF"/>
  <rect x="93" y="226" width="11" height="20" rx="2" fill="#CCE8FF" opacity="0.8"/>
  <rect x="108" y="226" width="11" height="20" rx="2" fill="#CCE8FF" opacity="0.8"/>
  <circle cx="94" cy="282" r="7" fill="#333"/>
  <circle cx="118" cy="282" r="7" fill="#333"/>
  <!-- Arrow pointing right (should move right) -->
  <path d="M 136,250 L 160,250" stroke="#FF3333" stroke-width="4" marker-end="url(#ra)"/>
  <polygon points="136,250 155,244 155,256" fill="#FF3333"/>
  <!-- Prohibition X -->
  <line x1="125" y1="238" x2="148" y2="270" stroke="#FF3333" stroke-width="4"/>
  <line x1="148" y1="238" x2="125" y2="270" stroke="#FF3333" stroke-width="4"/>
  <!-- Correct position indicator (right lane) -->
  <rect x="230" y="220" width="36" height="60" rx="6" fill="#3399FF" opacity="0.35" stroke="#3399FF" stroke-width="3" stroke-dasharray="5,3"/>
  <!-- Green arrow to correct lane -->
  <path d="M 150,254 Q 180,254 222,254" stroke="#2ECC40" stroke-width="4" fill="none"/>
  <polygon points="222,248 238,254 222,260" fill="#2ECC40"/>
  <!-- Labels -->
  <text x="97" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white">Carril izq.</text>
  <text x="251" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white">Carril der.</text>
</svg>