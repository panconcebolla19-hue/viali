<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#90C060"/>
  <!-- Urban road: 4 lanes total + bus lanes -->
  <rect x="20" y="60" width="360" height="280" fill="#888888"/>
  <!-- Lane dividers -->
  <line x1="20" y1="200" x2="380" y2="200" stroke="#FFD700" stroke-width="4"/>
  <!-- Upper half: 1 regular + 1 bus -->
  <line x1="20" y1="130" x2="380" y2="130" stroke="white" stroke-width="2" stroke-dasharray="16,10"/>
  <!-- Lower half: 1 regular + 1 bus -->
  <line x1="20" y1="270" x2="380" y2="270" stroke="white" stroke-width="2" stroke-dasharray="16,10"/>
  <!-- Bus lane markings (top) -->
  <text x="200" y="97" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="22" fill="white" opacity="0.5">BUS</text>
  <!-- Bus lane markings (bottom) -->
  <text x="200" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="22" fill="white" opacity="0.5">BUS</text>
  <!-- Edge lines -->
  <line x1="20" y1="60" x2="380" y2="60" stroke="white" stroke-width="3"/>
  <line x1="20" y1="340" x2="380" y2="340" stroke="white" stroke-width="3"/>
  <!-- Buildings (urban context) -->
  <rect x="0" y="0" width="20" height="400" fill="#BBBBBB"/>
  <rect x="380" y="0" width="20" height="400" fill="#BBBBBB"/>
  <!-- Speed sign -->
  <circle cx="320" cy="185" r="36" fill="white" stroke="#CC0000" stroke-width="7"/>
  <text x="320" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="28" fill="#222222">30</text>
  <!-- Bracket showing counted lanes -->
  <line x1="28" y1="350" x2="28" y2="370" stroke="#333" stroke-width="2"/>
  <line x1="28" y1="360" x2="372" y2="360" stroke="#333" stroke-width="2"/>
  <line x1="372" y1="350" x2="372" y2="370" stroke="#333" stroke-width="2"/>
  <text x="200" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#333333">1 carril por sentido (BUS no cuenta) → 30 km/h</text>
</svg>