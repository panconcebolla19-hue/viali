<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#90C060"/>
  <!-- Vertical road -->
  <rect x="160" y="0" width="80" height="400" fill="#888888"/>
  <!-- Horizontal road from right -->
  <rect x="240" y="160" width="160" height="80" fill="#888888"/>
  <!-- Lane markings vertical -->
  <line x1="200" y1="0" x2="200" y2="155" stroke="white" stroke-width="3" stroke-dasharray="18,12"/>
  <line x1="200" y1="245" x2="200" y2="400" stroke="white" stroke-width="3" stroke-dasharray="18,12"/>
  <!-- Lane markings horizontal -->
  <line x1="245" y1="200" x2="400" y2="200" stroke="white" stroke-width="3" stroke-dasharray="18,12"/>
  <!-- Stop line at junction -->
  <line x1="160" y1="160" x2="240" y2="160" stroke="white" stroke-width="4"/>
  <!-- CEDA EL PASO sign -->
  <polygon points="200,130 220,164 180,164" fill="white" stroke="#CC0000" stroke-width="5" stroke-linejoin="round"/>
  <!-- Car approaching from right -->
  <rect x="295" y="172" width="50" height="26" rx="5" fill="#3399FF"/>
  <polygon points="295,172 285,185 295,198" fill="#3399FF"/>
  <!-- Arrow showing car direction (coming from right, going left) -->
  <line x1="290" y1="185" x2="260" y2="185" stroke="white" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Our car approaching intersection from bottom -->
  <rect x="176" y="280" width="28" height="50" rx="5" fill="#FF6600"/>
  <!-- Direction arrow -->
  <polygon points="185,275 190,260 195,275" fill="white"/>
  <!-- Label -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white">CEDA EL PASO — cruce con prioridad</text>
</svg>