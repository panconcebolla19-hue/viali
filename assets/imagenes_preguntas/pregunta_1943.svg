<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#E8E8E8"/>
  <!-- Quadricycle (4-wheeled light vehicle, Renault Twizy style) -->
  <!-- Main body (compact, narrow) -->
  <rect x="130" y="170" width="140" height="140" rx="20" fill="#2244AA"/>
  <!-- Roof -->
  <ellipse cx="200" cy="175" rx="60" ry="18" fill="#1A3388"/>
  <!-- Body top section -->
  <rect x="145" y="158" width="110" height="30" rx="15" fill="#1A3388"/>
  <!-- Windshield (large, bubble-like) -->
  <ellipse cx="200" cy="185" rx="52" ry="28" fill="#AACCFF" opacity="0.85"/>
  <!-- Side window -->
  <rect x="138" y="192" width="22" height="50" rx="6" fill="#AACCFF" opacity="0.7"/>
  <rect x="240" y="192" width="22" height="50" rx="6" fill="#AACCFF" opacity="0.7"/>
  <!-- Door outline -->
  <rect x="133" y="188" width="30" height="85" rx="8" fill="none" stroke="#1A3388" stroke-width="3"/>
  <rect x="237" y="188" width="30" height="85" rx="8" fill="none" stroke="#1A3388" stroke-width="3"/>
  <!-- Headlights -->
  <ellipse cx="155" cy="175" rx="14" ry="8" fill="#FFFFAA"/>
  <ellipse cx="245" cy="175" rx="14" ry="8" fill="#FFFFAA"/>
  <!-- Rear lights -->
  <ellipse cx="155" cy="305" rx="14" ry="8" fill="#FF3333"/>
  <ellipse cx="245" cy="305" rx="14" ry="8" fill="#FF3333"/>
  <!-- Front bumper -->
  <rect x="140" y="310" width="120" height="14" rx="6" fill="#1A3388"/>
  <!-- Wheels (4 wheels clearly visible) -->
  <circle cx="148" cy="210" r="28" fill="#333"/>
  <circle cx="148" cy="210" r="18" fill="#555"/>
  <circle cx="148" cy="210" r="8" fill="#888"/>
  <circle cx="252" cy="210" r="28" fill="#333"/>
  <circle cx="252" cy="210" r="18" fill="#555"/>
  <circle cx="252" cy="210" r="8" fill="#888"/>
  <circle cx="148" cy="295" r="28" fill="#333"/>
  <circle cx="148" cy="295" r="18" fill="#555"/>
  <circle cx="148" cy="295" r="8" fill="#888"/>
  <circle cx="252" cy="295" r="28" fill="#333"/>
  <circle cx="252" cy="295" r="18" fill="#555"/>
  <circle cx="252" cy="295" r="8" fill="#888"/>
  <!-- Rider visible -->
  <circle cx="200" cy="188" r="15" fill="#F5C5A0"/>
  <!-- Helmet required sign -->
  <circle cx="320" cy="100" r="38" fill="#FFDD00" stroke="#CC8800" stroke-width="4"/>
  <!-- Helmet icon -->
  <ellipse cx="320" cy="93" rx="22" ry="16" fill="#222"/>
  <rect x="298" y="104" width="44" height="8" rx="4" fill="#222"/>
  <text x="320" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#333">CASCO</text>
  <text x="320" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#333">OBLIGATORIO</text>
  <!-- Passenger label -->
  <text x="200" y="365" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333333">Cuadriciclo — casco obligatorio</text>
  <text x="200" y="383" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555555">para conductor y pasajero</text>
</svg>