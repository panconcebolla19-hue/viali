<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Yellow triangle (obras) -->
  <polygon points="200,45 368,330 32,330" fill="#FFDD00" stroke="#CC0000" stroke-width="14" stroke-linejoin="round"/>
  <!-- Road narrowing from LEFT symbol -->
  <!-- Road: two vertical lines that converge on left side -->
  <line x1="155" y1="295" x2="155" y2="185" stroke="#333333" stroke-width="10" stroke-linecap="round"/>
  <line x1="245" y1="295" x2="245" y2="100" stroke="#333333" stroke-width="10" stroke-linecap="round"/>
  <!-- Left side narrows: angled line -->
  <line x1="155" y1="185" x2="200" y2="100" stroke="#333333" stroke-width="10" stroke-linecap="round"/>
  <!-- Bottom connecting line -->
  <line x1="155" y1="295" x2="245" y2="295" stroke="#333333" stroke-width="10" stroke-linecap="round"/>
  <!-- OBRAS label on sign -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="15" fill="#333333">OBRAS</text>
  <!-- Caption -->
  <text x="200" y="365" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#555555">Estrechamiento por la izquierda</text>
  <text x="200" y="383" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#CC6600">(fondo amarillo = por obras)</text>
</svg>