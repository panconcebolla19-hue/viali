<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#222222"/>
  <!-- Rearview mirror view showing police car approaching from behind -->
  <!-- Mirror frame (oval) -->
  <ellipse cx="200" cy="200" rx="170" ry="130" fill="#1A1A2A" stroke="#888888" stroke-width="8"/>
  <!-- Road visible in mirror (receding perspective) -->
  <polygon points="30,330 370,330 280,90 120,90" fill="#555555"/>
  <!-- Lane markings in mirror -->
  <line x1="200" y1="330" x2="200" y2="90" stroke="white" stroke-width="2" stroke-dasharray="12,8"/>
  <line x1="120" y1="330" x2="160" y2="90" stroke="white" stroke-width="2"/>
  <line x1="280" y1="330" x2="240" y2="90" stroke="white" stroke-width="2"/>
  <!-- Police car (approaching from behind, center of mirror) -->
  <!-- Car body -->
  <rect x="165" y="185" width="70" height="110" rx="8" fill="#FFFFFF"/>
  <!-- Police blue/white pattern -->
  <rect x="165" y="185" width="70" height="30" rx="6" fill="#003399"/>
  <!-- Windshield (facing us — rear window) -->
  <rect x="172" y="218" width="56" height="38" rx="4" fill="#AADDFF" opacity="0.9"/>
  <!-- Emergency light bar on roof -->
  <rect x="163" y="178" width="74" height="14" rx="5" fill="#222222"/>
  <!-- Flashing blue lights -->
  <circle cx="178" cy="185" r="8" fill="#0055FF" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="185" r="8" fill="#FF3333" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="222" cy="185" r="8" fill="#0055FF" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <!-- POLICÍA text on car -->
  <text x="200" y="257" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="11" fill="#003399">POLICÍA</text>
  <!-- Police car wheels -->
  <circle cx="172" cy="300" r="12" fill="#333"/>
  <circle cx="172" cy="300" r="7" fill="#555"/>
  <circle cx="228" cy="300" r="12" fill="#333"/>
  <circle cx="228" cy="300" r="7" fill="#555"/>
  <!-- Mirror reflection effect (slight gradient overlay) -->
  <!-- Glow from emergency lights -->
  <ellipse cx="200" cy="185" rx="70" ry="20" fill="#0033AA" opacity="0.15"/>
  <!-- Mirror border shadow -->
  <ellipse cx="200" cy="200" rx="170" ry="130" fill="none" stroke="#AAAAAA" stroke-width="3"/>
  <!-- Arrow: pull to the right -->
  <line x1="310" y1="350" x2="360" y2="350" stroke="#00CC44" stroke-width="5" stroke-linecap="round"/>
  <polygon points="360,342 375,350 360,358" fill="#00CC44"/>
  <!-- Caption -->
</svg>
