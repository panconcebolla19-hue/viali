<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#90C060"/>
  <!-- One-way street (horizontal) -->
  <rect x="0" y="130" width="400" height="140" fill="#888888"/>
  <!-- One-way arrows on road -->
  <polygon points="50,200 65,190 65,210" fill="white" opacity="0.35"/>
  <polygon points="110,200 125,190 125,210" fill="white" opacity="0.35"/>
  <polygon points="275,200 290,190 290,210" fill="white" opacity="0.35"/>
  <polygon points="335,200 350,190 350,210" fill="white" opacity="0.35"/>
  <!-- Edge markings -->
  <line x1="0" y1="130" x2="400" y2="130" stroke="white" stroke-width="3"/>
  <line x1="0" y1="270" x2="400" y2="270" stroke="white" stroke-width="3"/>
  <!-- Tram tracks in center -->
  <line x1="0" y1="188" x2="400" y2="188" stroke="#888888" stroke-width="6"/>
  <line x1="0" y1="212" x2="400" y2="212" stroke="#888888" stroke-width="6"/>
  <!-- Rail ties -->
  <line x1="60" y1="183" x2="60" y2="217" stroke="#666" stroke-width="3"/>
  <line x1="100" y1="183" x2="100" y2="217" stroke="#666" stroke-width="3"/>
  <line x1="140" y1="183" x2="140" y2="217" stroke="#666" stroke-width="3"/>
  <line x1="220" y1="183" x2="220" y2="217" stroke="#666" stroke-width="3"/>
  <line x1="260" y1="183" x2="260" y2="217" stroke="#666" stroke-width="3"/>
  <line x1="300" y1="183" x2="300" y2="217" stroke="#666" stroke-width="3"/>
  <line x1="340" y1="183" x2="340" y2="217" stroke="#666" stroke-width="3"/>
  <!-- Tram body -->
  <rect x="145" y="167" width="110" height="66" rx="8" fill="#FFDD00" stroke="#CC8800" stroke-width="3"/>
  <rect x="152" y="173" width="32" height="22" rx="3" fill="#CCEEEE" opacity="0.9"/>
  <rect x="190" y="173" width="32" height="22" rx="3" fill="#CCEEEE" opacity="0.9"/>
  <rect x="228" y="173" width="18" height="22" rx="3" fill="#CCEEEE" opacity="0.9"/>
  <!-- TRAM label -->
  <text x="200" y="217" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="13" fill="#664400">TRANVÍA</text>
  <!-- Car right side (can pass on right) -->
  <rect x="50" y="232" width="42" height="26" rx="5" fill="#3399FF"/>
  <polygon points="50,232 38,245 50,258" fill="#3399FF"/>
  <!-- Car left side (can pass on left) -->
  <rect x="50" y="142" width="42" height="26" rx="5" fill="#FF6600"/>
  <polygon points="50,142 38,155 50,168" fill="#FF6600"/>
  <!-- Green arrows both sides -->
  <polygon points="20,145 32,140 32,150" fill="#2ECC40"/>
  <polygon points="20,255 32,250 32,260" fill="#2ECC40"/>
  <!-- One-way sign -->
  <rect x="310" y="88" width="60" height="28" rx="4" fill="#336699"/>
  <polygon points="312,102 325,88 325,116" fill="white"/>
  <text x="348" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="white">→</text>
  <!-- Caption -->
</svg>