<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#D8E8C8"/>
  <!-- Intersection top-down view -->
  <!-- Roads -->
  <rect x="0" y="160" width="400" height="80" fill="#888888"/>
  <rect x="160" y="0" width="80" height="400" fill="#888888"/>
  <!-- Road markings -->
  <line x1="0" y1="200" x2="155" y2="200" stroke="white" stroke-width="2" stroke-dasharray="15,10"/>
  <line x1="245" y1="200" x2="400" y2="200" stroke="white" stroke-width="2" stroke-dasharray="15,10"/>
  <line x1="200" y1="0" x2="200" y2="155" stroke="white" stroke-width="2" stroke-dasharray="15,10"/>
  <line x1="200" y1="245" x2="200" y2="400" stroke="white" stroke-width="2" stroke-dasharray="15,10"/>
  <!-- Intersection box -->
  <rect x="160" y="160" width="80" height="80" fill="#999999"/>
  <!-- Traffic agent in center of intersection -->
  <!-- Agent body -->
  <circle cx="200" cy="200" r="12" fill="#F5C5A0"/>
  <!-- High-vis vest -->
  <rect x="190" y="212" width="20" height="25" rx="4" fill="#FF6600"/>
  <rect x="190" y="220" width="20" height="5" fill="#FFDD00" opacity="0.9"/>
  <!-- Both arms raised (blocking all traffic) -->
  <!-- Left arm raised -->
  <line x1="190" y1="218" x2="168" y2="205" stroke="#FF6600" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm raised -->
  <line x1="210" y1="218" x2="232" y2="205" stroke="#FF6600" stroke-width="8" stroke-linecap="round"/>
  <!-- Hands -->
  <circle cx="165" cy="203" r="5" fill="#F5C5A0"/>
  <circle cx="235" cy="203" r="5" fill="#F5C5A0"/>
  <!-- Hard hat -->
  <ellipse cx="200" cy="193" rx="14" ry="5" fill="#FFDD00"/>
  <rect x="186" y="190" width="28" height="7" rx="3" fill="#FFDD00"/>
  <!-- Car coming from left (inside intersection already) -->
  <rect x="115" y="183" width="38" height="24" rx="4" fill="#3399FF"/>
  <rect x="120" y="187" width="12" height="10" rx="2" fill="#AADDFF" opacity="0.8"/>
  <rect x="134" y="187" width="12" height="10" rx="2" fill="#AADDFF" opacity="0.8"/>
  <circle cx="120" cy="208" r="5" fill="#333"/>
  <circle cx="148" cy="208" r="5" fill="#333"/>
  <!-- Arrow: car moving right (already entered intersection) -->
  <polygon points="155,192 165,196 155,200" fill="#3399FF"/>
  <!-- Car waiting from top (outside, must stop) -->
  <rect x="183" y="100" width="24" height="38" rx="4" fill="#FF4444"/>
  <rect x="187" y="106" width="8" height="12" rx="2" fill="#FFCCCC" opacity="0.8"/>
  <rect x="198" y="106" width="8" height="12" rx="2" fill="#FFCCCC" opacity="0.8"/>
  <circle cx="188" cy="140" r="5" fill="#333"/>
  <circle cx="208" cy="140" r="5" fill="#333"/>
  <!-- Stop line for top car -->
  <line x1="162" y1="158" x2="238" y2="158" stroke="white" stroke-width="4"/>
  <!-- Caption -->
  <text x="200" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#333333">Agente en intersección — brazos extendidos</text>
  <text x="200" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555555">Los ya entrados no están obligados a parar</text>
</svg>
