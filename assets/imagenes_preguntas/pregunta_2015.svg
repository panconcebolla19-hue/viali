<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#EEEEEE"/>
  <!-- Construction worker / señalista with stop paddle -->
  <!-- Legs -->
  <line x1="185" y1="290" x2="175" y2="370" stroke="#222266" stroke-width="18" stroke-linecap="round"/>
  <line x1="215" y1="290" x2="225" y2="370" stroke="#222266" stroke-width="18" stroke-linecap="round"/>
  <!-- Torso: high-vis orange jacket -->
  <rect x="163" y="195" width="74" height="100" rx="10" fill="#FF6600"/>
  <!-- Reflective stripes -->
  <rect x="163" y="220" width="74" height="9" fill="#FFDD00" opacity="0.9"/>
  <rect x="163" y="255" width="74" height="9" fill="#FFDD00" opacity="0.9"/>
  <!-- Arms -->
  <!-- Left arm down at side -->
  <line x1="163" y1="215" x2="130" y2="270" stroke="#FF6600" stroke-width="18" stroke-linecap="round"/>
  <circle cx="124" cy="274" r="13" fill="#F5C5A0"/>
  <!-- Right arm raised holding paddle -->
  <line x1="237" y1="215" x2="265" y2="155" stroke="#FF6600" stroke-width="18" stroke-linecap="round"/>
  <circle cx="268" cy="148" r="13" fill="#F5C5A0"/>
  <!-- Head -->
  <circle cx="200" cy="163" r="32" fill="#F5C5A0"/>
  <!-- Hard hat (yellow) -->
  <ellipse cx="200" cy="138" rx="38" ry="13" fill="#FFDD00"/>
  <rect x="162" y="133" width="76" height="18" rx="6" fill="#FFDD00"/>
  <rect x="155" y="147" width="90" height="7" rx="3" fill="#CCAA00"/>
  <!-- Face -->
  <circle cx="190" cy="166" r="4" fill="#333"/>
  <circle cx="210" cy="166" r="4" fill="#333"/>
  <path d="M188,177 Q200,185 212,177" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <!-- STOP paddle -->
  <!-- Handle -->
  <rect x="266" y="100" width="10" height="50" rx="4" fill="#888888"/>
  <!-- Octagonal sign -->
  <polygon points="278,50 298,40 318,40 330,50 330,80 318,90 298,90 278,80" fill="#CC0000"/>
  <polygon points="280,53 296,44 314,44 326,53 326,77 314,86 296,86 280,77" fill="#CC2200"/>
  <text x="304" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="white">STOP</text>
  <!-- Caption -->
</svg>