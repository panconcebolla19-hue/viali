<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#90C060"/>
  <!-- Road surface -->
  <rect x="0" y="140" width="400" height="120" fill="#888888"/>
  <!-- Right shoulder (arcén) -->
  <rect x="0" y="252" width="400" height="30" fill="#AAAAAA"/>
  <!-- White edge line -->
  <line x1="0" y1="252" x2="400" y2="252" stroke="white" stroke-width="4"/>
  <!-- Center line (yellow) -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#FFD700" stroke-width="3" stroke-dasharray="20,12"/>
  <!-- Grass beyond shoulder -->
  <rect x="0" y="282" width="400" height="118" fill="#70A040"/>
  <!-- Vehicle correctly parked BEYOND the shoulder (on grass) -->
  <rect x="120" y="288" width="80" height="40" rx="6" fill="#3399FF"/>
  <!-- Windows -->
  <rect x="128" y="292" width="26" height="16" rx="3" fill="#CCE8FF" opacity="0.8"/>
  <rect x="162" y="292" width="26" height="16" rx="3" fill="#CCE8FF" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="133" cy="330" r="7" fill="#333"/>
  <circle cx="187" cy="330" r="7" fill="#333"/>
  <!-- Arrow showing car is OFF the shoulder -->
  <line x1="160" y1="260" x2="160" y2="283" stroke="#006600" stroke-width="3"/>
  <polygon points="155,282 160,295 165,282" fill="#006600"/>
  <!-- Checkmark -->
  <circle cx="330" cy="310" r="22" fill="#4CAF50"/>
  <polyline points="318,310 327,320 345,300" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Labels -->
  <text x="200" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333333">CALZADA</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555555">ARCÉN</text>
  <text x="200" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#333333">Vehículo estacionado fuera del arcén ✓</text>
</svg>