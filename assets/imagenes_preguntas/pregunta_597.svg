<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Traffic light pole -->
  <rect x="192" y="280" width="16" height="100" fill="#555555"/>
  <!-- Traffic light box -->
  <rect x="145" y="60" width="110" height="230" rx="12" fill="#333333"/>
  <!-- Red light (off) -->
  <circle cx="200" cy="110" r="34" fill="#440000"/>
  <text x="200" y="117" text-anchor="middle" font-size="30" fill="#660000">●</text>
  <!-- Amber light (off) -->
  <circle cx="200" cy="175" r="34" fill="#443300"/>
  <!-- Green light (ON) with bicycle icon -->
  <circle cx="200" cy="240" r="34" fill="#00CC44"/>
  <!-- Bicycle silhouette in green light -->
  <!-- Wheels -->
  <circle cx="186" cy="246" r="9" fill="none" stroke="black" stroke-width="2.5"/>
  <circle cx="214" cy="246" r="9" fill="none" stroke="black" stroke-width="2.5"/>
  <!-- Frame -->
  <line x1="186" y1="246" x2="200" y2="233" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="233" x2="214" y2="246" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="233" x2="200" y2="240" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rider -->
  <circle cx="200" cy="228" r="4" fill="black"/>
  <!-- Handlebar -->
  <line x1="214" y1="246" x2="218" y2="237" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="216" y1="237" x2="222" y2="237" stroke="black" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#333333">Semáforo para ciclos</text>
  <text x="200" y="360" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#555555">(bicicletas y ciclomotores)</text>
  <text x="200" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#777777">Sus indicaciones afectan solo a ciclos y ciclomotores</text>
</svg>