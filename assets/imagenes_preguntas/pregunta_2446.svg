<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#D8E8C8"/>
  <!-- Urban intersection, car wanting to turn right at red light -->
  <!-- Roads top-down -->
  <rect x="0" y="160" width="400" height="80" fill="#888888"/>
  <rect x="160" y="0" width="80" height="250" fill="#888888"/>
  <!-- Lane markings -->
  <line x1="200" y1="0" x2="200" y2="155" stroke="white" stroke-width="2" stroke-dasharray="15,10"/>
  <line x1="0" y1="200" x2="155" y2="200" stroke="white" stroke-width="2" stroke-dasharray="15,10"/>
  <line x1="245" y1="200" x2="400" y2="200" stroke="white" stroke-width="2" stroke-dasharray="15,10"/>
  <!-- Intersection box -->
  <rect x="160" y="160" width="80" height="80" fill="#999999"/>
  <!-- Stop line -->
  <line x1="162" y1="160" x2="238" y2="160" stroke="white" stroke-width="5"/>
  <!-- Car at stop line, wanting to turn right -->
  <rect x="172" y="112" width="28" height="42" rx="4" fill="#2255CC"/>
  <rect x="177" y="118" width="9" height="14" rx="2" fill="#AADDFF" opacity="0.8"/>
  <rect x="189" y="118" width="9" height="14" rx="2" fill="#AADDFF" opacity="0.8"/>
  <circle cx="178" cy="155" r="5" fill="#333"/>
  <circle cx="198" cy="155" r="5" fill="#333"/>
  <!-- Right-turn arrow on road -->
  <path d="M186,145 Q186,108 215,108" fill="none" stroke="#FFDD00" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="215,102 222,108 215,114" fill="#FFDD00"/>
  <!-- Traffic light (RED) -->
  <rect x="245" y="110" width="28" height="70" rx="6" fill="#333333"/>
  <circle cx="259" cy="125" r="10" fill="#FF0000"/>
  <circle cx="259" cy="147" r="10" fill="#444444"/>
  <circle cx="259" cy="169" r="10" fill="#444444"/>
  <!-- Light pole -->
  <line x1="259" y1="180" x2="259" y2="220" stroke="#666" stroke-width="4"/>
  <!-- RED indicator label -->
  <text x="259" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="14" fill="#FF0000">ROJO</text>
  <!-- STOP symbol -->
  <circle cx="340" cy="80" r="28" fill="white" stroke="#CC0000" stroke-width="5"/>
  <rect x="326" y="72" width="28" height="16" rx="3" fill="#CC0000"/>
  <rect x="334" y="58" width="12" height="28" rx="3" fill="#CC0000"/>
  <!-- Caption -->
  <text x="200" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#333333">Semáforo en rojo — giro a la derecha</text>
  <text x="200" y="392" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#555555">Obligatorio detenerse</text>
</svg>
